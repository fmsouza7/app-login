# CI de Nível 01, 02 - Disparo Manual através de clique

# nome da pipeline
name: 'Execução Testes Unitários'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho automático = push

on:
  # Execução manual
  workflow_dispatch:
  # Execução Agendada
  schedule:
    # Cronograma de Execução
    # 1 - Minuto, 2 - hora, 3 - dia do mês, 4 - mês, 5 - dia da semana
    # Roda a cada 30 min
    - cron: '*/30 * * * *'
  # Execução automatica - após push 
  push:
    branches:
      - main

#tarefas dentro da pipeline = jobs
jobs:
  #nome do job
  unidade:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      # instalação das dependências
      - name: Instalando dependências
        run: yarn
      
      # execução de testes unitarios e Geração de relatórios
      - name: Executando testes unitários
        run: yarn test:reports

      # Upload do relatorio Mochawesome
      - name: Salvando Relatório Mochawesome
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: Relatório Mochawesome
          path: ./reports/mochawesome/

      # Upload do relatorio JUnit
      - name: Salvando Relatório JUnit
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: Relatório JUnit
          path: ./reports/junit/test-results.xml

      - name: Publicar Relatório JUnit na UI do GitHub Actions
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Testes Unitários
          path: reports/junit/test-results.xml
          reporter: mocha
